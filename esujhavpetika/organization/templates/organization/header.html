{% load static %}
<head>
    <style>
        .header {
            background-color: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 10px 20px;
        }
        .header .logo-container {
            display: flex;
            align-items: center;
            text-decoration: none;
        }
        .header .logo-text {
            font-size: 24px;
            margin-left: 10px;
        }
        .header .btn {
            margin-left: auto;
        }
        .header a {
            text-decoration: none; 
        }
    </style>
</head>
<body>
    <header class="header d-flex align-items-center">
        <a href="{% url 'baseapp' %}" class="logo-container" style=>
            <img src="{% static 'organization/Images/logo-icon.png' %}" alt="Logo" height="25" width="36" />
            <div class="logo-text text-dark">eSujhav<b class="text-primary">Petika</b></div>
        </a>
        {% if request.user.is_authenticated %}

        <a href="{% url 'login' %}" class="ml-auto">
            <button type="button" class="button">Sign Up / Login</button>
        </a>
        {% else %}
        <a href="{% url 'login' %}" class="ml-auto">
            <button type="button" class="btn btn-primary">Create new </button>
        </a>
        {% endif %}


    </header>
</body>
